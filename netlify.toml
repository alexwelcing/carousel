# Netlify build config for welc.ing
# Assumes this file sits at the repo root (the app/ contents are the repo root).
# If instead you commit the project so this lives at /app, set base = "app" below.

[build]
  command = "pnpm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Fast static delivery for generated packet assets.
# Current videos use stable /pitch.mp4 URLs, so keep browser TTL short enough
# that newly rendered videos replace HTML fallbacks quickly. If/when videos move
# to content-hashed names, raise MP4/WebM to max-age=31536000, immutable.
[[headers]]
  for = "/packets/**/*.mp4"
  [headers.values]
    Cache-Control = "public, max-age=300, stale-while-revalidate=604800"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/packets/**/*.webm"
  [headers.values]
    Cache-Control = "public, max-age=300, stale-while-revalidate=604800"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/packets/**/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/applications/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/packets/**/*.pdf"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"
    X-Content-Type-Options = "nosniff"

# Missing packet videos should not fall through to the SPA shell. Existing static
# files still win because these redirects are not forced.
[[redirects]]
  from = "/packets/:shareId/pitch.mp4"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/packets/:shareId/pitch.webm"
  to = "/404.html"
  status = 404

# SPA fallback so /role/:slug deep links resolve to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
